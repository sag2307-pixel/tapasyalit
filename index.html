<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tapasya Lite</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    color: white;
    background: url('baba.jpg') no-repeat center center/cover;
}

/* Overlay fix */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(1px);
    z-index: 0;
    pointer-events: none; /* IMPORTANT FIX */
}

h1, button, #message {
    z-index: 1;
}

h1 {
    font-size: 45px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px black;
}

/* Button */
button {
    padding: 18px 35px;
    font-size: 20px;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(45deg, #ffcc00, #ff6600);
    color: black;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

button:hover {
    transform: scale(1.1);
}

#message {
    margin-top: 25px;
    font-size: 24px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 1.5s;
}

/* Animations */
@keyframes pulse {
    0% { box-shadow: 0 0 10px #ffcc00; }
    50% { box-shadow: 0 0 25px #ff6600; }
    100% { box-shadow: 0 0 10px #ffcc00; }
}
</style>
</head>

<body>

<h1>Tapasya Lite</h1>

<button onclick="showBlessing()">Click here for blessings</button>

<div id="message"></div>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function showBlessing() {
    const msg = document.getElementById("message");
    const music = document.getElementById("bgMusic");

    music.play().catch(() => console.log("Audio blocked"));

    msg.style.opacity = "1";
    msg.innerText = "Receiving divine signal...";

    setTimeout(() => {
        msg.innerText = "Believe in your training….. and not baba’s blessings 😄";
    }, 2000);
}
</script>

</body>
</html>
