<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapasya Lite</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    color: white;
    background: url('baba.jpg') no-repeat center center/cover;
}

/* Overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    z-index: 0;
    pointer-events: none;
}

h1, button, #message {
    z-index: 1;
}

/* Responsive Heading */
h1 {
    font-size: 8vw; /* Scales with screen */
    max-font-size: 70px;
    margin-bottom: 30px;
    text-shadow: 2px 2px 10px black;
}

/* Button */
button {
    padding: 20px 40px;
    font-size: 6vw;
    max-font-size: 40px;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(45deg, #ffcc00, #ff6600);
    color: black;
    font-weight: bold;
    animation: pulse 1.5s infinite;
}

button:hover {
    transform: scale(1.1);
}

/* Message */
#message {
    margin-top: 25px;
    font-size: 7vw;
    max-font-size: 50px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 1.5s;
}

/* Desktop fallback */
@media (min-width: 768px) {
    h1 {
        font-size: 60px;
    }
    button {
        font-size: 35px;
    }
    #message {
        font-size: 50px;
    }
}

/* Animation */
@keyframes pulse {
    0% { box-shadow: 0 0 10px #ffcc00; }
    50% { box-shadow: 0 0 25px #ff6600; }
    100% { box-shadow: 0 0 10px #ffcc00; }
}
</style>
</head>

<body>

<h1>Tapasya Lite</h1>

<button onclick="showBlessing()">Click here for blessings</button>

<div id="message"></div>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<script>
function showBlessing() {
    const msg = document.getElementById("message");
    const music = document.getElementById("bgMusic");

    music.play().catch(() => console.log("Audio blocked"));

    msg.style.opacity = "1";
    msg.innerText = "Receiving divine signal...";

    setTimeout(() => {
        msg.innerText = "APNE TRAINING PE VISHWAS KARO ...BABA JI PE NAHI 😄";
    }, 2000);
}
</script>

</body>
</html>
